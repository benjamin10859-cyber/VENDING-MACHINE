<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음료 자판기 과제</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="vending-machine">
        <h1 class="title">VENDING MACHINE</h1>

        <div class="product-grid">
            <div class="product-item">
                <div class="product-mock">콜라</div>
                <span class="product-price">1,500원</span>
            </div>
            <div class="product-item">
                <div class="product-mock">사이다</div>
                <span class="product-price">1,400원</span>
            </div>
            <div class="product-item">
                <div class="product-mock">환타</div>
                <span class="product-price">1,200원</span>
            </div>
            <div class="product-item">
                <div class="product-mock">이온음료</div>
                <span class="product-price">1,600원</span>
            </div>
            <div class="product-item">
                <div class="product-mock">커피</div>
                <span class="product-price">1,000원</span>
            </div>
            <div class="product-item">
                <div class="product-mock">생수</div>
                <span class="product-price">800원</span>
            </div>
        </div>

        <div class="control-panel">
            <div class="display-section">
                <div class="money-display">투입 금액: 0원</div>
                <input type="text" placeholder="금액을 입력하세요" class="money-input" disabled>
                <button class="btn">금액 투입</button>
            </div>
            
            <div class="return-section">
                <div class="return-box">음료 나오는 곳</div>
                <button class="btn btn-return">잔돈 반환</button>
            </div>
        </div>
    </div>

</body>
</html>
